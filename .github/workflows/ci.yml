name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            npm-shrinkwrap.json
            app/npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

      - name: Lint
        run: npm run lint

  playwright:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            npm-shrinkwrap.json
            app/npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

      - name: Run Playwright tests
        run: npm run test:playwright

  tests:
    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 20]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            npm-shrinkwrap.json
            app/npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0

      - name: Run tests (no Playwright)
        run: npm run test:noplaywright
